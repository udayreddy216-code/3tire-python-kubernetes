version: "3.9"
services:

  # ── TIER 2: Backend — Python Flask + Gunicorn ─────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hospital-backend
    env_file:
      - ./backend/.env           # Loads all Azure MySQL credentials automatically
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - hospital-network

  # ── TIER 3: Frontend — Nginx ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hospital-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hospital-network

networks:
  hospital-network:
    driver: bridge
